<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：手机自适应视口 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猫谷礼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 渐变粉色动态背景 */
            background: linear-gradient(135deg, #ffe6f0, #ffd6e7);
            background-size: 200% 200%;
            animation: bgFlow 12s ease infinite;
            min-height: 100vh;
            padding: 40px 15px;
            font-family: "Microsoft YaHei", sans-serif;

            /* 可选全屏背景图，取消注释启用 */
            /*
            background-image: url("bg.jpg");
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-position: center;
            background-size: cover;
            background-blend-mode: overlay;
            */
        }
        /* 背景缓慢流动动画 */
        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 {
            text-align: center;
            font-size: 30px;
            /* 渐变标题文字 */
            background: linear-gradient(90deg, #96c, #c69);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(153, 102, 204, 0.2);
        }

        /* 分组容器 白色卡片美化 */
        .group-wrap {
            max-width: 900px;
            margin: 0 auto 40px auto;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 18px;
            box-shadow: 0 6px 22px rgba(170, 110, 160, 0.12);
            transition: all 0.3s ease;
        }
        .group-wrap:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(170, 110, 160, 0.2);
        }

        /* 分组小标题 加左右分割线装饰 */
        .group-title {
            font-size: 22px;
            color: #963;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            position: relative;
        }
        .group-title::before,
        .group-title::after {
            content: "";
            display: inline-block;
            width: 70px;
            height: 1px;
            background: #d8b8cc;
            vertical-align: middle;
            margin: 0 14px;
        }

        /* 按钮容器：横向一行排列，自动换行 */
        .btn-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-direction: row;
            flex-wrap: wrap; /* 宽度不够自动换行 */
        }

        .audio-btn {
            padding: 13px 18px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            /* 紫粉渐变按钮 */
            background: linear-gradient(135deg, #739, #95b);
            color: white;
            cursor: pointer;
            width: min(220px, 44%);
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(110, 70, 160, 0.2);
            letter-spacing: 1px;
        }
        /* 悬浮效果：上浮+变亮+发光阴影 */
        .audio-btn:hover {
            background: linear-gradient(135deg, #84a, #a6c);
            transform: translateY(-3px);
            box-shadow: 0 0 14px #c8b8e0, 0 6px 16px rgba(110, 70, 160, 0.28);
        }
        /* 点击按压回弹 */
        .audio-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(110, 70, 160, 0.18);
        }

        /* ===== 图片装饰样式 ===== */
        /* 右下角固定小猫装饰 */
        .decor-cat {
            position: fixed;
            right: 20px;
            bottom: 20px;
            width: 100px;
            opacity: 0.85;
            pointer-events: none;
            z-index: -1;
        }
        /* 左上角爱心装饰 */
        .decor-heart {
            position: fixed;
            left: 15px;
            top: 120px;
            width: 70px;
            opacity: 0.7;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <!-- 页面装饰图片 -->
    <img class="decor-cat" src="cat.png">
    <img class="decor-heart" src="heart.png">

    <h2>猫谷礼</h2>

    <!-- 第一组 -->
    <div class="group-wrap">
        <h3 class="group-title">经典咏流传</h3>
        <div class="btn-box">
            <button class="audio-btn" onclick="playAudio('audio1')">哈哈哈哈哈哈</button>
            <button class="audio-btn" onclick="playAudio('audio12')">痴汉笑</button>
            <button class="audio-btn" onclick="playAudio('audio2')">你喵你个咪咪</button>
            <button class="audio-btn" onclick="playAudio('audio3')">你给我爬</button>
            <button class="audio-btn" onclick="playAudio('audio4')">auv</button>
            <button class="audio-btn" onclick="playAudio('audio11')">咕咕嘎嘎</button>
        </div>
    </div>

    <!-- 第二组 -->
    <div class="group-wrap">
        <h3 class="group-title">😈</h3>
        <div class="btn-box">
            <button class="audio-btn" onclick="playAudio('audio5')">生化危机9😈</button>
            <button class="audio-btn" onclick="playAudio('audio6')">破防1</button>
            <button class="audio-btn" onclick="playAudio('audio7')">啊啊啊啊啊啊</button>
            <button class="audio-btn" onclick="playAudio('audio8')">我讨厌你们</button>
        </div>
    </div>

    <!-- 第三组 -->
    <div class="group-wrap">
        <h3 class="group-title">哈气</h3>
        <div class="btn-box">
            <button class="audio-btn" onclick="playAudio('audio9')">哈气1</button>
            <button class="audio-btn" onclick="playAudio('audio10')">哈气2</button>

        </div>
    </div>

    <!-- 音频标签 -->
    <audio id="audio1" src="sound1.mp3">
    <audio id="audio12" src="痴汉笑.mp3">
    <audio id="audio2" src="你喵喵你个咪咪.mp3">
    <audio id="audio3" src="你给我爬.mp3">
    <audio id="audio4" src="auv.mp3">
    <audio id="audio5" src="生化危机9.mp3">
    <audio id="audio6" src="破防1.mp3">
    <audio id="audio7" src="啊啊啊啊啊啊啊啊.mp3">
    <audio id="audio8" src="我讨厌你们.mp3">
    <audio id="audio9" src="哈气1.mp3">
    <audio id="audio10" src="哈气2.mp3">
    <audio id="audio11" src="咕咕嘎嘎.mp3">


    <script>
        let currentAudio = null;
        function playAudio(id) {
            const audio = document.getElementById(id);
            if (!audio) {
                console.log("找不到音频文件：" + id);
                return;
            }
            // 切换音频停止上一段
            if(currentAudio && currentAudio !== audio){
                currentAudio.pause();
                currentAudio.currentTime = 0;
            }
            if(audio.paused){
                audio.play().catch(err=>{
                    console.log("播放失败：",err);
                    alert("点击页面任意位置后再点按钮！");
                });
                currentAudio = audio;
            }else{
                audio.pause();
                currentAudio = null;
            }
        }
    </script>
</body>
</html>
