<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 关键：手机自适应视口 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>猫谷礼</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            /* 渐变粉色动态背景 */
            background: linear-gradient(135deg, #ffe6f0, #ffd6e7);
            background-size: 200% 200%;
            animation: bgFlow 12s ease infinite;
            min-height: 100vh;
            padding: 40px 15px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        /* 背景缓慢流动动画 */
        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 {
            text-align: center;
            font-size: 30px;
            /* 渐变标题文字 */
            background: linear-gradient(90deg, #96c, #c69);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            margin-bottom: 50px;
            text-shadow: 0 2px 10px rgba(153, 102, 204, 0.2);
        }

        /* 分组容器 白色卡片美化 */
        .group-wrap {
            max-width: 900px;
            margin: 0 auto 40px auto;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 18px;
            box-shadow: 0 6px 22px rgba(170, 110, 160, 0.12);
            transition: all 0.3s ease;
        }
        .group-wrap:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(170, 110, 160, 0.2);
        }

        /* 分组小标题 加左右分割线装饰 */
        .group-title {
            font-size: 22px;
            color: #963;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            position: relative;
        }
        .group-title::before,
        .group-title::after {
            content: "";
            display: inline-block;
            width: 70px;
            height: 1px;
            background: #d8b8cc;
            vertical-align: middle;
            margin: 0 14px;
        }

        /* 按钮容器：横向一行排列，自动换行 */
        .btn-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-direction: row;
            flex-wrap: wrap; /* 宽度不够自动换行 */
        }

        .audio-btn {
            padding: 13px 18px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            /* 紫粉渐变按钮 */
            background: linear-gradient(135deg, #739, #95b);
            color: white;
            cursor: pointer;
            width: min(220px, 44%);
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(110, 70, 160, 0.2);
            letter-spacing: 1px;
        }
        /* 悬浮效果：上浮+变亮+发光阴影 */
        .audio-btn:hover {
            background: linear-gradient(135deg, #84a, #a6c);
            transform: translateY(-3px);
            box-shadow: 0 0 14px #c8b8e0, 0 6px 16px rgba(110, 70, 160, 0.28);
        }
        /* 点击按压回弹 */
        .audio-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(110, 70, 160, 0.18);
        }

        /* 全局控制按钮特殊样式，区分普通音效按钮 */
        .global-btn {
            width: min(220px, 44%);
            font-weight: bold;
        }
        /* 单次播放 */
        .mode-once {
            background: linear-gradient(135deg, #3b8, #5da);
        }
        .mode-once:hover {
            background: linear-gradient(135deg, #4c9, #6eb);
        }
        /* 单曲循环 */
        .mode-single {
            background: linear-gradient(135deg, #28a, #4bd);
        }
        .mode-single:hover {
            background: linear-gradient(135deg, #39b, #5ce);
        }
        /* 随机循环 */
        .mode-random {
            background: linear-gradient(135deg, #c79, #d6a);
        }
        .mode-random:hover {
            background: linear-gradient(135deg, #d8a, #e7b);
        }
        /* 停止按钮 */
        .stop-btn {
            background: linear-gradient(135deg, #d44, #f66);
        }
        .stop-btn:hover {
            background: linear-gradient(135deg, #e55, #f88);
        }
        /* 当前激活模式高亮边框 */
        .active-mode {
            box-shadow: 0 0 0 3px #333 !important;
        }
    </style>
</head>
<body>
    <h2>猫谷礼</h2>

    <!-- 播放模式选择控制区 -->
    <div class="group-wrap">
        <h3 class="group-title">播放模式选择</h3>
        <div class="btn-box">
            <button class="audio-btn global-btn mode-once" id="btnOnce" onclick="setOncePlay()">单次播放</button>
            <button class="audio-btn global-btn mode-single" id="btnSingle" onclick="setSingleLoop()">单曲循环</button>
            <button class="audio-btn global-btn mode-random" id="btnRandom" onclick="setRandomLoop()">随机循环</button>
            <button class="audio-btn global-btn stop-btn" id="btnStop" onclick="stopAllPlay()">停止全部播放</button>
        </div>
    </div>

    <!-- 第一组 -->
    <div class="group-wrap">
        <h3 class="group-title">经典咏流传</h3>
        <div class="btn-box">
            <button class="audio-btn" onclick="playAudio('audio1')">哈哈哈哈哈哈</button>
            <button class="audio-btn" onclick="playAudio('audio12')">痴汉笑</button>
            <button class="audio-btn" onclick="playAudio('audio2')">你喵你个咪咪</button>
            <button class="audio-btn" onclick="playAudio('audio3')">你给我爬</button>
            <button class="audio-btn" onclick="playAudio('audio4')">auv</button>
            <button class="audio-btn" onclick="playAudio('audio11')">咕咕嘎嘎</button>
        </div>
    </div>

    <!-- 第二组 -->
    <div class="group-wrap">
        <h3 class="group-title">😈</h3>
        <div class="btn-box">
            <button class="audio-btn" onclick="playAudio('audio5')">生化危机9😈</button>
            <button class="audio-btn" onclick="playAudio('audio6')">破防1</button>
            <button class="audio-btn" onclick="playAudio('audio7')">啊啊啊啊啊啊</button>
            <button class="audio-btn" onclick="playAudio('audio8')">我讨厌你们</button>
        </div>
    </div>

    <!-- 第三组 -->
    <div class="group-wrap">
        <h3 class="group-title">哈气</h3>
        <div class="btn-box">
            <button class="audio-btn" onclick="playAudio('audio9')">哈气1</button>
            <button class="audio-btn" onclick="playAudio('audio10')">哈气2</button>
        </div>
    </div>

    <!-- 音频标签 -->
    <audio id="audio1" src="sound1.mp3">
    <audio id="audio12" src="痴汉笑.mp3">
    <audio id="audio2" src="你喵喵你个咪咪.mp3">
    <audio id="audio3" src="你给我爬.mp3">
    <audio id="audio4" src="auv.mp3">
    <audio id="audio5" src="生化危机9.mp3">
    <audio id="audio6" src="破防1.mp3">
    <audio id="audio7" src="啊啊啊啊啊啊啊啊.mp3">
    <audio id="audio8" src="我讨厌你们.mp3">
    <audio id="audio9" src="哈气1.mp3">
    <audio id="audio10" src="哈气2.mp3">
    <audio id="audio11" src="咕咕嘎嘎.mp3">

    <script>
        let currentAudio = null;
        // 四种模式：none / once / single / random
        let playMode = "none";
        // 当前选中音效ID
        let targetAudioId = "";
        // 全部音频列表
        const allAudioIds = [
            'audio1', 'audio12', 'audio2', 'audio3', 'audio4', 'audio11',
            'audio5', 'audio6', 'audio7', 'audio8',
            'audio9', 'audio10'
        ];

        // 更新模式按钮高亮
        function updateModeBtn() {
            document.getElementById("btnOnce").classList.remove("active-mode");
            document.getElementById("btnSingle").classList.remove("active-mode");
            document.getElementById("btnRandom").classList.remove("active-mode");
            document.getElementById("btnStop").classList.remove("active-mode");
            if (playMode === "once") {
                document.getElementById("btnOnce").classList.add("active-mode");
            } else if (playMode === "single") {
                document.getElementById("btnSingle").classList.add("active-mode");
            } else if (playMode === "random") {
                document.getElementById("btnRandom").classList.add("active-mode");
            } else {
                document.getElementById("btnStop").classList.add("active-mode");
            }
        }

        // 清空当前音频、移除监听、停止播放
        function clearCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio.onended = null;
                currentAudio = null;
            }
        }

        // 停止全部播放，重置为无模式
        function stopAllPlay() {
            playMode = "none";
            targetAudioId = "";
            clearCurrentAudio();
            updateModeBtn();
        }

        // 设置：单次播放（播一遍停止）
        function setOncePlay() {
            playMode = "once";
            updateModeBtn();
            if (targetAudioId) playOnceAudio();
        }

        // 设置：单曲循环
        function setSingleLoop() {
            playMode = "single";
            updateModeBtn();
            if (targetAudioId) playSingleLoopAudio();
        }

        // 设置：随机循环
        function setRandomLoop() {
            playMode = "random";
            targetAudioId = "";
            clearCurrentAudio();
            updateModeBtn();
            playNextRandom();
        }

        // 点击下方音效按钮，默认切换为单次播放
        function playAudio(id) {
            targetAudioId = id;
            playMode = "once";
            updateModeBtn();
            playOnceAudio();
        }

        // 单次播放逻辑（播放结束不重复）
        function playOnceAudio() {
            clearCurrentAudio();
            const audio = document.getElementById(targetAudioId);
            if (!audio) return;
            currentAudio = audio;
            audio.onended = null;
            audio.play().catch(e => console.log("播放失败", e));
        }

        // 单曲循环逻辑（播放完自动重播）
        function playSingleLoopAudio() {
            clearCurrentAudio();
            const audio = document.getElementById(targetAudioId);
            if (!audio) return;
            currentAudio = audio;
            audio.onended = () => {
                if (playMode === "single") {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log("播放失败", e));
                }
            };
            audio.play().catch(e => console.log("播放失败", e));
        }

        // 随机循环下一首
        function playNextRandom() {
            if (playMode !== "random") return;
            clearCurrentAudio();
            const randomIdx = Math.floor(Math.random() * allAudioIds.length);
            const aid = allAudioIds[randomIdx];
            const audio = document.getElementById(aid);
            currentAudio = audio;
            audio.onended = () => {
                if (playMode === "random") playNextRandom();
            };
            audio.play().catch(e => console.log("播放失败", e));
        }

        // 初始化默认选中停止
        updateModeBtn();
    </script>
</body>
</html>
