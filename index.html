    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #ffe6f0, #ffd6e7);
            background-size: 200% 200%;
            animation: bgFlow 12s ease infinite;
            min-height: 100vh;
            padding: 40px 15px;
            font-family: "Microsoft YaHei", sans-serif;
        }
        @keyframes bgFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        h2 {
            text-align: center;
            font-size: 30px;
            background: linear-gradient(90deg, #96c, #c69);
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: 3px;
            margin-bottom: 30px;
            text-shadow: 0 2px 10px rgba(153, 102, 204, 0.2);
        }

        /* 顶部切换标签栏 */
        .tab-wrap {
            max-width: 900px;
            margin: 0 auto 40px auto;
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        .tab-btn {
            padding: 14px 36px;
            font-size: 18px;
            border: none;
            border-radius: 12px;
            background: #fff;
            color: #774499;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(170, 110, 160, 0.15);
            transition: all 0.25s ease;
        }
        .tab-btn:hover {
            background: #f8e6f0;
            transform: translateY(-2px);
        }
        .tab-btn.active-tab {
            background: linear-gradient(135deg, #739, #95b);
            color: #fff;
        }

        /* 页面区块，默认隐藏 */
        .page-block {
            display: none;
        }
        .page-block.show {
            display: block;
        }

        /* 分组容器 白色卡片美化 */
        .group-wrap {
            max-width: 900px;
            margin: 0 auto 40px auto;
            background: #ffffff;
            padding: 30px 20px;
            border-radius: 18px;
            box-shadow: 0 6px 22px rgba(170, 110, 160, 0.12);
            transition: all 0.3s ease;
        }
        .group-wrap:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(170, 110, 160, 0.2);
        }

        .group-title {
            font-size: 22px;
            color: #963;
            text-align: center;
            margin-bottom: 25px;
            font-weight: 600;
            position: relative;
        }
        .group-title::before,
        .group-title::after {
            content: "";
            display: inline-block;
            width: 70px;
            height: 1px;
            background: #d8b8cc;
            vertical-align: middle;
            margin: 0 14px;
        }

        .btn-box {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            flex-direction: row;
            flex-wrap: wrap;
        }

        .audio-btn {
            padding: 13px 18px;
            font-size: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #739, #95b);
            color: white;
            cursor: pointer;
            width: min(220px, 44%);
            transition: all 0.25s ease;
            box-shadow: 0 4px 10px rgba(110, 70, 160, 0.2);
            letter-spacing: 1px;
        }
        .audio-btn:hover {
            background: linear-gradient(135deg, #84a, #a6c);
            transform: translateY(-3px);
            box-shadow: 0 0 14px #c8b8e0, 0 6px 16px rgba(110, 70, 160, 0.28);
        }
        .audio-btn:active {
            transform: translateY(1px);
            box-shadow: 0 2px 6px rgba(110, 70, 160, 0.18);
        }

        .global-btn {
            width: min(220px, 44%);
            font-weight: bold;
        }
        .mode-once {
            background: linear-gradient(135deg, #3b8, #5da);
        }
        .mode-once:hover {
            background: linear-gradient(135deg, #4c9, #6eb);
        }
        .mode-single {
            background: linear-gradient(135deg, #28a, #4bd);
        }
        .mode-single:hover {
            background: linear-gradient(135deg, #39b, #5ce);
        }
        .mode-random {
            background: linear-gradient(135deg, #c79, #d6a);
        }
        .mode-random:hover {
            background: linear-gradient(135deg, #d8a, #e7b);
        }
        .stop-btn {
            background: linear-gradient(135deg, #d44, #f66);
        }
        .stop-btn:hover {
            background: linear-gradient(135deg, #e55, #f88);
        }
        .active-mode {
            box-shadow: 0 0 0 3px #333 !important;
        }

        /* 歌单页面专用样式 */
        .search-input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid #e0c8d8;
            border-radius: 12px;
            font-size: 16px;
            outline: none;
            margin-bottom: 20px;
        }
        .search-input:focus {
            border-color: #a878b8;
            box-shadow: 0 0 0 3px rgba(168, 120, 184, 0.2);
        }
        .song-text {
            width: 100%;
            padding: 12px;
            background: #f8f0f5;
            color: #552255;
            border-radius: 10px;
            text-align: center;
            margin: 8px 0;
        }
        .page-btn {
            width: auto !important;
            padding: 8px 16px;
            margin-top: 15px;
        }
    </style>
</head>

            }
        }

        // 渲染歌曲+分页
        function renderSongList(){
            const resultBox = document.getElementById('songResultBox');
            const pageBox = document.getElementById('pageBox');
            resultBox.innerHTML = "";
            pageBox.innerHTML = "";

            const total = filterSongData.length;
            if (total === 0) {
                resultBox.innerHTML = "<p style='color:#999;text-align:center;'>暂无歌曲</p>";
                return;
            }

            // 截取当前页数据
            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = filterSongData.slice(start, end);

            pageData.forEach(song => {
                const div = document.createElement("div");
                div.className = "song-text";
                div.innerText = `${song.name}-${song.singer}`;
                resultBox.appendChild(div);
            });

            // 生成分页按钮
            const totalPage = Math.ceil(total / pageSize);
            if(totalPage > 1){
                // 上一页
                const prevBtn = document.createElement('button');
                prevBtn.className = "audio-btn page-btn";
                prevBtn.innerText = "上一页";
                prevBtn.disabled = currentPage === 1;
                prevBtn.onclick = () => {
                    currentPage--;
                    renderSongList();
                };
                pageBox.appendChild(prevBtn);

                // 页码文字
                const tip = document.createElement('span');
                tip.style.padding = "0 12px";
                tip.style.lineHeight = "42px";
                tip.innerText = `第${currentPage}/${totalPage}页`;
                pageBox.appendChild(tip);

                // 下一页
                const nextBtn = document.createElement('button');
                nextBtn.className = "audio-btn page-btn";
                nextBtn.innerText = "下一页";
                nextBtn.disabled = currentPage === totalPage;
                nextBtn.onclick = () => {
                    currentPage++;
                    renderSongList();
                };
                pageBox.appendChild(nextBtn);
            }
        }

        // 歌单搜索功能
        function searchSong() {
            const keyword = document.getElementById('songSearch').value.trim().toLowerCase();
            // 空关键词：展示全部歌曲
            if (!keyword) {
                filterSongData = [...songList];
            } else {
                // 有关键词：模糊筛选
                filterSongData = songList.filter(song =>
                    song.name.toLowerCase().includes(keyword) || song.singer.toLowerCase().includes(keyword)
                );
            }
            currentPage = 1;
            renderSongList();
        }

        // ========== 下方是你原有音声播放全部逻辑，无需改动 ==========
        let currentAudio = null;
        let playMode = "none";
        let targetAudioId = "";
        const allAudioIds = [
            'audio1', 'audio12', 'audio2', 'audio3', 'audio4', 'audio11',
            'audio5', 'audio6', 'audio7', 'audio8',
            'audio9', 'audio10'
        ];

        function updateModeBtn() {
            document.getElementById("btnOnce").classList.remove("active-mode");
            document.getElementById("btnSingle").classList.remove("active-mode");
            document.getElementById("btnRandom").classList.remove("active-mode");
            document.getElementById("btnStop").classList.remove("active-mode");
            if (playMode === "once") {
                document.getElementById("btnOnce").classList.add("active-mode");
            } else if (playMode === "single") {
                document.getElementById("btnSingle").classList.add("active-mode");
            } else if (playMode === "random") {
                document.getElementById("btnRandom").classList.add("active-mode");
            } else {
                document.getElementById("btnStop").classList.add("active-mode");
            }
        }

        function clearCurrentAudio() {
            if (currentAudio) {
                currentAudio.pause();
                currentAudio.currentTime = 0;
                currentAudio.onended = null;
                currentAudio = null;
            }
        }

        function stopAllPlay() {
            playMode = "none";
            targetAudioId = "";
            clearCurrentAudio();
            updateModeBtn();
        }

        function setOncePlay() {
            playMode = "once";
            updateModeBtn();
            if (targetAudioId) playOnceAudio();
        }

        function setSingleLoop() {
            playMode = "single";
            updateModeBtn();
            if (targetAudioId) playSingleLoopAudio();
        }

        function setRandomLoop() {
            playMode = "random";
            targetAudioId = "";
            clearCurrentAudio();
            updateModeBtn();
            playNextRandom();
        }

        function playAudio(id) {
            targetAudioId = id;
            playMode = "once";
            updateModeBtn();
            playOnceAudio();
        }

        function playOnceAudio() {
            clearCurrentAudio();
            const audio = document.getElementById(targetAudioId);
            if (!audio) return;
            currentAudio = audio;
            audio.onended = null;
            audio.play().catch(e => console.log("播放失败", e));
        }

        function playSingleLoopAudio() {
            clearCurrentAudio();
            const audio = document.getElementById(targetAudioId);
            if (!audio) return;
            currentAudio = audio;
            audio.onended = () => {
                if (playMode === "single") {
                    audio.currentTime = 0;
                    audio.play().catch(e => console.log("播放失败", e));
                }
            };
            audio.play().catch(e => console.log("播放失败", e));
        }

        function playNextRandom() {
            if (playMode !== "random") return;
            clearCurrentAudio();
            const randomIdx = Math.floor(Math.random() * allAudioIds.length);
            const aid = allAudioIds[randomIdx];
            const audio = document.getElementById(aid);
            currentAudio = audio;
            audio.onended = () => {
                if (playMode === "random") playNextRandom();
            };
            audio.play().catch(e => console.log("播放失败", e));
        }

        updateModeBtn();
    </script>
</body>
</html>
